name: Discord 배포 완료 알림

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types:
      - completed

jobs:
  notify:
    # pages 배포 성공 시에만 알림
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Discord 알림 전송
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && echo "DISCORD_WEBHOOK_URL 미설정 — 건너뜀" && exit 0
          PAYLOAD=$(node -e "
            const m = require('./static/manifest.json');
            const kst = new Date(m.updatedAt).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            const sheetList = m.sheets.map(s => '• ' + s.name + ' v' + s.version).join('\n');
            const body = {
              embeds: [{
                title: '✅ 스태틱 데이터 배포 완료',
                color: 5763719,
                fields: [
                  { name: '업데이트 시각 (KST)', value: kst, inline: false },
                  { name: '시트 목록 (' + m.sheets.length + '개)', value: sheetList, inline: false }
                ],
                footer: { text: 'Game Static Data Server — GitHub Pages 반영 완료' }
              }]
            };
            console.log(JSON.stringify(body));
          ")
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
