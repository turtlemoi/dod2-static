name: Update Static Sheets

on:
  workflow_dispatch:   # Code.gs 또는 GitHub 웹에서 수동 트리거

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # static/ 폴더 커밋 권한

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: Google Sheets → JSON 생성
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: node sheetParser.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/
          git diff --staged --quiet || git commit -m "데이터 갱신: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Discord 알림
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && echo "DISCORD_WEBHOOK_URL 미설정 — 건너뜀" && exit 0
          PAYLOAD=$(node -e "
            const m = require('./static/manifest.json');
            const kst = new Date(m.updatedAt).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            const sheetList = m.sheets.map(s => '• ' + s.name + ' v' + s.version).join('\n');
            const body = {
              embeds: [{
                title: '✅ 스태틱 데이터 최신화 완료',
                color: 5763719,
                fields: [
                  { name: '업데이트 시각 (KST)', value: kst, inline: false },
                  { name: '시트 목록 (' + m.sheets.length + '개)', value: sheetList, inline: false }
                ],
                footer: { text: 'Game Static Data Server' }
              }]
            };
            console.log(JSON.stringify(body));
          ")
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
